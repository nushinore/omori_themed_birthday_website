        <style>
            @font-face {
                font-family: 'OMORI_GAME';

            @font-face {
                font-family: 'OMORI_GAME2';
                src: url('OMORI_GAME2.ttf') format('truetype');
            }
            h1 {
                text-align: center;
                width: 100%; /* Ensures the header spans the whole screen to find the true center */
                font-family:'OMORI_GAME2';
                color: white;
                font-size: 95px;
                text-shadow: #0b011c;
                outline-color: #050505;
            }
            .strokeme{                
                text-shadow:
                    -2px -2px 0 #000,
                    2px -2px 0 #000,
                    -2px 2px 0 #000,
                    2px 2px 0 #000;  
                }
            .playground-scene {
                position: relative;
                display: inline-block; /* Fits the exact size of your background image */
                }    
            .swinging-character {
                position: absolute;
                cursor: pointer;
                /* Adjust these percentage numbers until the sprite lines up perfectly with the seat */
                 top: 13%;   
                 left: 78%;  
                 width: 90px; 
                 z-index: 10; /* Ensures the character sits on top of the swing seat background */
                }
            .bench-character {
                position: absolute;
                cursor: pointer;
                /* Adjust these percentage numbers until the sprite lines up perfectly with the seat */
                 top: -24%;   
                 left: 126.5%;  
                 width: 82px; 
                 z-index: 10; /* Ensures the character sits on top of the swing seat background */
                }
                .bench-character2 {
                position: absolute;
                cursor: pointer;
                /* Adjust these percentage numbers until the sprite lines up perfectly with the seat */
                 top: -27.5%;   
                 left: 119%;  
                 width: 85px; 
                 z-index: 10; /* Ensures the character sits on top of the swing seat background */
                }
            .polaroids{
                position: absolute;
                cursor: pointer;
                top: 70%;   
                left: 100%;  
                width: 70px; 
                z-index: 10;
            }
            .bouncing_header
            {
                display: inline-block;/* Required for transforms to work well on text */
                animation: floatUpDown 2s ease-in-out infinite
            }
            @keyframes floatUpDown {
            0% {
                transform: translateY(0px); /* Starting position */
            }
            50% {
                transform: translateY(-20px); /* Moves up by 20 pixels */
            }
            100% {
                transform: translateY(0px); /* Returns to starting position */
            }
            }
            body {
            background-image: url('new background.jpg');
            background-repeat: no-repeat;
            background-position: center top;
            background-size: 100%;
            background-color: #0b011c;
            margin: 0;
            height: 100vh;
            image-rendering: pixelated;
            }
            .bottom-dialogue {
            display: none; 
            position: fixed;
            bottom: 20px; 
            left: 50%;
            transform: translateX(-50%); 
            width: 100%;
            max-width: 800px;
            background-color: #050505; 
            color: #ffffff;
            padding-top:10px;
            padding-left:20px;
            border-radius: 10px;
            border-color: #888;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);
            font-family: OMORI_GAME2;
            font-size: 30px;
            z-index: 1000;
            }
            button{
                cursor: pointer; 
                border: none; 
                background: transparent; 
                color: #ffffff; 
                font-family: OMORI_GAME2; 
                font-size: 30px;
                margin-bottom: 10px;
            }
            button:hover{
                font-size: 25px;
                color:"red";
            }
            /* Blurs and darkens the entire browser layout */
            .dark-overlay {
                display: none; /* Controlled by JavaScript triggers */
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background-color: rgba(0, 0, 0, 0.7); /* Adjust 0.7 to make it darker or lighter */
                backdrop-filter: blur(4px); /* Optional: Adds a cozy OMORI background blur */
                justify-content: center;
                align-items: center;
                flex-direction: column;
                z-index: 99999; /* Forces it over absolutely everything else */
                cursor: pointer;
            }
            .close-hint {
                color: #888;
                font-family: 'OMORI_GAME2';
                font-size: 20px;
                margin-top: 20px;
                }
            .showcase-photo{
                box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
                width: 350px;
                height: 421px;
            }
            .center-image-container {
                display: flex;
                gap: 30px; /* Space between the images */
                max-width: 90%;
                justify-content: center;
                }
            #flash-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background-color: white;
                opacity: 0;
                pointer-events: none;
                z-index: 9999; /* Keeps it on top of everything else */
                transition: opacity 0.1s ease-in-out; /* The speed going into the flash */
            }
            #flash-overlay.active {
                opacity: 1;
                transition: opacity 0.05s ease-in-out; /* Snap to white quickly */
                }
